[provider]
# Priority: yahoo → fcontext
default = "yahoo"
fallback = ["fcontext"]

[provider.fcontext]
cli = "fcontext"
timeout_secs = 30

[account]
initial_cash = 100000.0
currency = "USD"

[trading]
# Platform/broker fee per order; regulatory fees (SEC, stamp duty, levies) are always modeled.
commission_per_trade = 0.0
commission_bps = 0.0
min_commission = 0.0
slippage_bps = 5.0

[cache]
enabled = true
ttl_secs = 60

[watchlist]
symbols = [
    "AAPL",
    "MSFT",
    "NVDA",
    "GOOGL",
    "AMZN",
    "META",
    "TSLA",
]
